
models:
  router: "openai/gpt-4o-mini"
  reflection: "openai/gpt-4o-mini"

  # Keep Sonnet here because its tool-calling (Kapruka MCP) and Vision are flawless
  shopper: "qwen/qwen3.7-plus"
  

  # Native vision support — Gemini Flash handles multimodal well and cheaply
  vision: "google/gemini-3.1-flash-lite"

  # User-facing personality is ~65% of the judging rubric — don't cut cost here
  # concierge: "google/gemini-2.5-flash"
  concierge: "openai/gpt-4o-mini"


kapruka:
  mcp_url: "https://mcp.kapruka.com/mcp"
  rate_limit_rpm: 60
  cache_ttl_minutes: 30

tryon:
  fal_app_id: "fal-ai/kling/v1-5/kolors-virtual-try-on"
  timeout_seconds: 90

memory:
  session_ttl_hours: 2
  max_sessions: 100
  max_reflection_loops: 2

prompts:
  version: "1.0.0"
