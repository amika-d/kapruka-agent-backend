name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Check syntax
        run: |
          source .venv/bin/activate
          python -m py_compile $(find . -name "*.py" | grep -v __pycache__)

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
              cd ~/kapruka-agent-backend
              git pull origin main
              source venv/bin/activate
              /home/ubuntu/kapruka-agent-backend/venv/bin/uv sync
              sudo systemctl daemon-reload
              sudo systemctl restart kapruka
              sudo systemctl status kapruka